name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Check
        run: npm run check

      - name: Smoke
        run: npm run smoke

      - name: Build
        run: npm run build
