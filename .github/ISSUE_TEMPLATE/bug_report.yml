name: Bug report
description: 不具合報告
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 何が起きたか
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps
      description: 再現手順
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected
      description: 本来どうなるべきか
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Node version / 実行モード / prompt / panel など
